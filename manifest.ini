name = kurum_rehberi
summary = "Kurum Rehberi"
description = """Kurum Rehberi, NVDA kullanıcıları için geliştirilmiş erişilebilir ve özelleştirilebilir bir kurum/personel rehberi eklentisidir. Ad, soyad, görev veya unvan, birim, telefon numarası, dahili numara, e-posta ve not bilgilerini kaydetme, arama, düzenleme, silme, içe aktarma ve dışa aktarma özellikleri sunar. Ayarlar bölümünden alan görünürlüğü değiştirilebilir; böylece eklenti sade bir telefon rehberi, e-posta rehberi veya kişisel iletişim rehberi olarak da kullanılabilir."""
author = "Mehmet Aykurt <m.aykurt38@gmail.com>"
url = https://github.com/MehmetAykurt/kurum-rehberi
